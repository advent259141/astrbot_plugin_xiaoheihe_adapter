<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小黑盒扫码登录</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #20242d;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #2563eb;
        --ok: #0f8a4b;
        --warn: #b45309;
        --bad: #b91c1c;
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: #151820;
        --panel: #1d222c;
        --text: #eef2f7;
        --muted: #a7b0bf;
        --line: #333b49;
        --accent: #6aa3ff;
        --ok: #5dd08d;
        --warn: #f0b45d;
        --bad: #ff7a7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
      }

      .title-group {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 14px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .qr-box {
        display: grid;
        place-items: center;
        min-height: 320px;
      }

      .qr-frame {
        width: 270px;
        height: 270px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .qr-frame svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .placeholder {
        color: var(--muted);
        text-align: center;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      button,
      .link-button {
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        padding: 0 14px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .tabs {
        display: inline-flex;
        gap: 4px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .tab {
        height: 28px;
        border: 0;
        border-radius: 5px;
        padding: 0 10px;
      }

      .tab.active {
        background: var(--accent);
        color: #fff;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      button.danger {
        color: var(--bad);
        border-color: var(--bad);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .status {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 10px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
        border-color: var(--ok);
      }

      .status.warn {
        color: var(--warn);
        border-color: var(--warn);
      }

      .status.bad {
        color: var(--bad);
        border-color: var(--bad);
      }

      dl {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 10px 12px;
        margin: 14px 0 0;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      .message {
        margin-top: 12px;
        color: var(--muted);
      }

      .message.error {
        color: var(--bad);
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 24px, 920px);
          padding-top: 18px;
        }

        header,
        .layout {
          display: block;
        }

        .panel + .panel {
          margin-top: 12px;
        }

        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="title-group">
          <h1>小黑盒扫码登录</h1>
          <nav class="tabs" aria-label="页面切换">
            <button class="tab active" type="button" data-page="login">登录</button>
            <button class="tab" type="button" data-page="status">状态</button>
          </nav>
        </div>
        <span id="state" class="status">未开始</span>
      </header>

      <section class="layout">
        <div class="panel">
          <div class="qr-box">
            <div id="qr" class="qr-frame">
              <div class="placeholder">点击开始后显示二维码</div>
            </div>
          </div>
          <div class="actions">
            <button id="start" class="primary" type="button">开始扫码</button>
            <button id="copy" type="button" disabled>复制链接</button>
            <button id="clear" class="danger" type="button">清除登录态</button>
          </div>
          <div id="message" class="message"></div>
        </div>

        <div class="panel">
          <strong>保存的登录态</strong>
          <dl id="session"></dl>
        </div>
      </section>
    </main>

    <script type="module">
      const bridge = window.AstrBotPluginPage;
      const qr = document.getElementById("qr");
      const state = document.getElementById("state");
      const message = document.getElementById("message");
      const session = document.getElementById("session");
      const start = document.getElementById("start");
      const copy = document.getElementById("copy");
      const clear = document.getElementById("clear");
      const pageButtons = document.querySelectorAll("[data-page]");

      let timer = null;
      let currentQr = "";
      let currentQrUrl = "";

      function switchPage(pageName) {
        if (!pageName || pageName === "login") return;
        stopTimer();
        const pluginName =
          bridge?.getContext?.()?.pluginName || "astrbot_plugin_xiaoheihe_adapter";
        const target = `/plugin-page/${encodeURIComponent(pluginName)}/${encodeURIComponent(pageName)}`;
        window.parent.location.href = target;
      }

      function setState(text, kind = "") {
        state.textContent = text;
        state.className = `status ${kind}`.trim();
      }

      function setMessage(text, isError = false) {
        message.textContent = text || "";
        message.className = `message ${isError ? "error" : ""}`.trim();
      }

      function stopTimer() {
        if (timer) clearTimeout(timer);
        timer = null;
      }

      function renderSession(data) {
        if (!data || !data.has_session) {
          session.innerHTML = field("状态", "未保存");
          return;
        }
        session.innerHTML = [
          field("状态", "已保存"),
          field("heybox_id", data.heybox_id || "-"),
          field("昵称", data.nickname || "-"),
          field("device_id", data.device_id || "-"),
          field("Cookie 长度", data.cookie_length || 0),
          field("更新时间", formatTime(data.updated_at)),
        ].join("");
      }

      function field(label, value) {
        return `<dt>${escapeHtml(label)}</dt><dd>${escapeHtml(value ?? "-")}</dd>`;
      }

      function formatTime(value) {
        if (!value) return "-";
        const date = new Date(Number(value) * 1000);
        return Number.isNaN(date.getTime()) ? "-" : date.toLocaleString();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function loadSession() {
        const data = await bridge.apiGet("login/session");
        renderSession(data);
      }

      async function startLogin() {
        stopTimer();
        start.disabled = true;
        copy.disabled = true;
        currentQr = "";
        currentQrUrl = "";
        qr.innerHTML = `<div class="placeholder">正在获取二维码</div>`;
        setMessage("");
        setState("创建中", "warn");
        try {
          const data = await bridge.apiPost("login/start", {});
          currentQr = data.qr;
          currentQrUrl = data.qr_url;
          qr.innerHTML = data.qr_svg || `<div class="placeholder">二维码生成失败</div>`;
          copy.disabled = !currentQrUrl;
          setState("等待扫码", "warn");
          setMessage("请使用小黑盒 App 扫码，并在手机端确认登录。");
          schedulePoll(Number(data.interval || 1500));
        } catch (error) {
          setState("失败", "bad");
          setMessage(error.message || String(error), true);
          qr.innerHTML = `<div class="placeholder">获取二维码失败</div>`;
        } finally {
          start.disabled = false;
        }
      }

      function schedulePoll(interval) {
        stopTimer();
        timer = setTimeout(pollLogin, Math.max(1000, interval || 1500));
      }

      async function pollLogin() {
        if (!currentQr) return;
        try {
          const data = await bridge.apiPost("login/poll", { qr: currentQr });
          if (data.status === "created") {
            stopTimer();
            setState("已登录", "ok");
            setMessage("登录态已保存。平台实例需要重载后使用新的扫码登录态。");
            await loadSession();
            return;
          }
          if (data.status === "expired") {
            stopTimer();
            setState("已过期", "bad");
            setMessage(data.message || "二维码已过期，请重新开始。", true);
            return;
          }
          if (data.status === "denied" || data.status === "error") {
            stopTimer();
            setState("失败", "bad");
            setMessage(data.message || "扫码登录失败。", true);
            return;
          }
          if (data.qr_status === "ready") {
            setState("待确认", "warn");
            setMessage("手机已扫码，请在小黑盒 App 内确认登录。");
          } else {
            setState("等待扫码", "warn");
          }
          schedulePoll(1500);
        } catch (error) {
          stopTimer();
          setState("失败", "bad");
          setMessage(error.message || String(error), true);
        }
      }

      async function copyLink() {
        if (!currentQrUrl) return;
        await navigator.clipboard.writeText(currentQrUrl);
        setMessage("登录链接已复制。");
      }

      async function clearSession() {
        stopTimer();
        await bridge.apiPost("login/clear", {});
        currentQr = "";
        currentQrUrl = "";
        copy.disabled = true;
        qr.innerHTML = `<div class="placeholder">点击开始后显示二维码</div>`;
        setState("未开始");
        setMessage("已清除保存的登录态。");
        await loadSession();
      }

      await bridge.ready();
      pageButtons.forEach((button) => {
        button.addEventListener("click", () => switchPage(button.dataset.page));
      });
      start.addEventListener("click", startLogin);
      copy.addEventListener("click", copyLink);
      clear.addEventListener("click", clearSession);
      window.addEventListener("beforeunload", stopTimer);
      await loadSession();
    </script>
  </body>
</html>
